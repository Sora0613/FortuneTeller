<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星詠み占い — 今日の運勢</title>
  <meta name="description" content="12の問いに答えて、今日の運勢をひも解く神秘の占いサイト">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="stars"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- ── Intro ─────────────────────────────────────────────────────────── -->
<section id="intro" class="screen active">
  <div class="container center">
    <div class="logo">✦</div>
    <h1 class="title">星詠み占い</h1>
    <p class="subtitle">— 宇宙があなたの今日を語る —</p>
    <div class="divider"></div>
    <p class="intro-desc">
      12の問いに、ただ直感で答えてください。<br>
      理屈は要りません。星々があなたの<br>
      今日の運勢を読み解きます。
    </p>
    <button id="start-btn" class="btn-primary">占いを始める</button>
  </div>
</section>

<!-- ── Quiz ──────────────────────────────────────────────────────────── -->
<section id="quiz" class="screen">
  <div class="container">
    <div class="progress-wrap">
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <span id="progress-count" class="progress-count">1 / 12</span>
    </div>

    <div id="question-block" class="question-block">
      <p id="q-label" class="q-label">第一問</p>
      <h2 id="q-text" class="q-text"></h2>
      <div id="options" class="options"></div>
    </div>
  </div>
</section>

<!-- ── Complete ───────────────────────────────────────────────────────── -->
<section id="complete" class="screen">
  <div class="container center">
    <div class="logo glow-pulse">✦</div>
    <h2 class="title" style="font-size:1.6rem">占いが完成しました</h2>
    <div class="divider"></div>
    <p class="intro-desc">星々があなたの答えを<br>読み解いています…</p>
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
    <a href="result.html" id="result-link" class="btn-primary">運勢を見る</a>
  </div>
</section>

<script src="js/data.js"></script>
<script src="js/quiz.js"></script>
</body>
</html>
